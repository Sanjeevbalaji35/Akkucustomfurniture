<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akku | Custom Structural Steel & Plywood Furniture</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandCharcoal: '#2D2A26',
            brandAlabaster: '#FAF7F2',
            brandSand: '#F2ECE1',
            brandCrimson: '#943A3A',
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-[#FAF7F2] text-[#2D2A26] min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Lucide Icon Native Mapper ---
    // Safely renders the specified icons inside the pure client environment
    function Icon({ name, size = 16, className = "" }) {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name]);
      return <i data-lucide={name} style={{ width: size, height: size }} class={`inline-block ${className}`}></i>;
    }

    // --- Practical & Realistic Hybrid Steel-Wood Templates ---
    const PRESET_TEMPLATES = [
      {
        id: 'shoe_rack_shelf',
        title: 'Deccan 5-Tier Organiser (Ref: image_13.png)',
        desc: 'Inspired by the multi-tier entryway storage seen in image_13.png. Built with matte black industrial piping supports and dark-walnut veneered plywood shelves. Perfect for heavy footwear loads.',
        dimensions: 'W: 90cm, D: 32cm, H: 110cm',
        metalFinish: 'matte_black',
        plywoodFace: 'crown_walnut',
        imgUrl: 'https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=800&q=80',
        category: 'Entryway & Storage',
        likes: 384,
        features: ['Matte Black Pipe Structure', 'Heavy-Duty Shoe Capacity', 'Modern Minimalist Entryway']
      },
      {
        id: 'dining_suite_bench',
        title: 'Rajpath Dining Combo (Ref: image_14.png)',
        desc: 'Designed after the set in image_14.png. A solid structural dining table featuring a black powdercoated steel chassis with a crown-cut walnut plywood top, paired with a matching structural bench.',
        dimensions: 'Table: 150x80x75cm, Bench: 120x35x45cm',
        metalFinish: 'matte_black',
        plywoodFace: 'crown_walnut',
        imgUrl: 'https://images.unsplash.com/photo-1530017758801-447a4c7e6822?auto=format&fit=crop&w=800&q=80',
        category: 'Dining Sets',
        likes: 412,
        features: ['Steel Frame Integrity', 'Generational Walnut Finish', 'Matching Storage Bench']
      },
      {
        id: 'corner_shelf',
        title: 'Coromandel Corner Column (Ref: image_12.png)',
        desc: 'The corner display column style featured in image_12.png. Welded vertical tubular steel frame supports thick plywood corner plates, ideal for showcasing decor in tight architectural spaces.',
        dimensions: 'W: 45cm, D: 45cm, H: 95cm',
        metalFinish: 'matte_black',
        plywoodFace: 'baltic_birch',
        imgUrl: 'https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=800&q=80',
        category: 'Living Room Corner',
        likes: 228,
        features: ['Tri-point stable iron columns', 'Baltic Birch plates', 'Compact Footprint']
      },
      {
        id: 'slatted_bench',
        title: 'Malabar Structural Bench (Ref: image_11.png)',
        desc: 'Capturing the industrial slatted look from image_11.png. Brushed raw steel loop frame with thick, flush-fitted natural oak plywood slats for maximum weight bearing and minimalist aesthetic.',
        dimensions: 'W: 130cm, D: 38cm, H: 45cm',
        metalFinish: 'brushed_steel',
        plywoodFace: 'natural_oak',
        imgUrl: 'https://images.unsplash.com/photo-1560185007-c5ca9d2c014d?auto=format&fit=crop&w=800&q=80',
        category: 'Benches & Outdoor',
        likes: 295,
        features: ['Brushed Steel Loop Frame', 'Flush Plywood Slats', 'Outdoor Grade Finish']
      }
    ];

    function AkkuLogo({ size = 32 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 100 100" fill="none" className="inline-block">
          <polygon points="50,15 90,85 10,85" fill="#943A3A" stroke="#943A3A" strokeWidth="2" strokeLinejoin="round" />
          <circle cx="50" cy="46" r="7.5" fill="white" />
          <circle cx="37" cy="68" r="7.5" fill="white" />
          <circle cx="63" cy="68" r="7.5" fill="white" />
        </svg>
      );
    }

    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [selectedTemplate, setSelectedTemplate] = useState(null);

      const handleLoadTemplate = (template) => {
        setSelectedTemplate(template);
        setCurrentView('design');
      };

      return (
        <div class="min-h-screen bg-[#FAF7F2] text-[#2D2A26] flex flex-col justify-between selection:bg-red-50 selection:text-red-900">
          <Navbar currentView={currentView} setCurrentView={setCurrentView} />
          
          <main class="flex-grow">
            {currentView === 'home' && <HomeView setCurrentView={setCurrentView} />}
            {currentView === 'design' && (
              <DesignStudio 
                setCurrentView={setCurrentView} 
                selectedTemplate={selectedTemplate}
                clearSelectedTemplate={() => setSelectedTemplate(null)}
              />
            )}
            {currentView === 'showcase' && <ShowcaseView onLoadTemplate={handleLoadTemplate} />}
            {currentView === 'profile' && <ProfileView />}
          </main>

          <footer class="bg-[#F2ECE1] text-[#2D2A26] py-12 text-center border-t border-[#E6DEC4]">
            <div class="max-w-6xl mx-auto px-4 flex flex-col items-center gap-4">
              <div class="flex items-center gap-2">
                <AkkuLogo size={36} />
                <span class="font-sans font-black tracking-widest text-xl text-[#2D2A26] uppercase">AKKU</span>
              </div>
              <p class="text-sm text-stone-600 max-w-md font-medium">
                Structural steel frames met with clean architectural plywood surfaces. Modern, robust, minimalist furniture built for your space.
              </p>
              <div class="w-12 h-[1px] bg-[#943A3A] my-2"></div>
              <p class="text-xs text-stone-500 font-semibold">© 2026 Akku Custom Manufacturing.</p>
            </div>
          </footer>
        </div>
      );
    }

    function Navbar({ currentView, setCurrentView }) {
      return (
        <nav class="bg-[#FAF7F2]/95 backdrop-blur-md border-b border-[#EAE3D2] sticky top-0 z-50">
          <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-20">
              <div class="flex items-center gap-3 cursor-pointer group" onClick={() => setCurrentView('home')}>
                <AkkuLogo size={40} />
                <div class="flex flex-col">
                  <span class="font-sans font-black text-2xl tracking-widest text-[#2D2A26] leading-none">AKKU</span>
                  <span class="text-[9px] uppercase tracking-widest font-bold text-[#943A3A] mt-1">Hybrid Systems</span>
                </div>
              </div>
              <div class="flex items-center gap-1">
                <button onClick={() => setCurrentView('home')} class={`flex items-center gap-1.5 px-3 py-2 rounded-lg font-bold text-xs uppercase tracking-wider ${currentView === 'home' ? 'text-[#943A3A] bg-[#F2ECE1]' : 'text-stone-700'}`}>
                  <Icon name="home" size={14} /> Home
                </button>
                <button onClick={() => setCurrentView('design')} class={`flex items-center gap-1.5 px-3 py-2 rounded-lg font-bold text-xs uppercase tracking-wider ${currentView === 'design' ? 'text-[#943A3A] bg-[#F2ECE1]' : 'text-stone-700'}`}>
                  <Icon name="pen-tool" size={14} /> Design Pad
                </button>
                <button onClick={() => setCurrentView('showcase')} class={`flex items-center gap-1.5 px-3 py-2 rounded-lg font-bold text-xs uppercase tracking-wider ${currentView === 'showcase' ? 'text-[#943A3A] bg-[#F2ECE1]' : 'text-stone-700'}`}>
                  <Icon name="sparkles" size={14} /> Inspirations
                </button>
                <button onClick={() => setCurrentView('profile')} class={`flex items-center gap-1.5 px-3 py-2 rounded-lg font-bold text-xs uppercase tracking-wider ${currentView === 'profile' ? 'text-[#943A3A] bg-[#F2ECE1]' : 'text-stone-700'}`}>
                  <Icon name="user" size={14} /> Track Order
                </button>
              </div>
            </div>
          </div>
        </nav>
      );
    }

    function HomeView({ setCurrentView }) {
      return (
        <div class="animate-in fade-in duration-300">
          <section class="relative bg-[#F5EFE6] text-[#2D2A26] overflow-hidden border-b border-[#EAE3D2]">
            <div class="relative max-w-6xl mx-auto px-6 py-24 text-center z-10">
              <h1 class="font-sans text-4xl sm:text-6xl font-black tracking-tight mb-6">
                Steel Structural Strength. <br/><span class="text-[#943A3A]">Smooth Plywood Aesthetics.</span>
              </h1>
              <p class="text-stone-700 max-w-2xl mx-auto mb-10 font-semibold">
                Custom steel frames married with organic plywood coverings. Robust, minimalist, built for your exact space.
              </p>
              <button onClick={() => setCurrentView('design')} class="bg-[#943A3A] text-white px-8 py-4 rounded-xl font-bold text-xs uppercase tracking-wider shadow-sm hover:scale-[1.01] transition-transform">
                Interactive Design Pad
              </button>
            </div>
          </section>
        </div>
      );
    }

    function DesignStudio({ selectedTemplate, clearSelectedTemplate }) {
      const [description, setDescription] = useState('');
      const [dimensions, setDimensions] = useState('');
      const [customFeatures, setCustomFeatures] = useState([]);
      const [currentFeatureInput, setCurrentFeatureInput] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      
      useEffect(() => {
        if (selectedTemplate) {
          setDescription(`Based on template: ${selectedTemplate.title}.\nModifications required: `);
          setDimensions(selectedTemplate.dimensions);
          setCustomFeatures(selectedTemplate.features || []);
          clearSelectedTemplate();
        }
      }, [selectedTemplate]);

      const handleAddFeatureTag = () => {
        const formattedTag = currentFeatureInput.trim();
        if (formattedTag && !customFeatures.includes(formattedTag)) {
          setCustomFeatures([...customFeatures, formattedTag]);
          setCurrentFeatureInput('');
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        setTimeout(() => {
          setIsSubmitting(false);
          setSubmitted(true);
        }, 1200);
      };

      if (submitted) {
        return (
          <div class="max-w-2xl mx-auto p-12 text-center my-12 bg-white rounded-3xl border border-[#EAE3D2]">
            <div class="text-[#943A3A] mb-4">
              <Icon name="check" size={48} className="mx-auto text-emerald-600 bg-emerald-50 p-2 rounded-full" />
            </div>
            <h2 class="text-2xl font-black mb-4 uppercase">Design Confirmed</h2>
            <p class="text-stone-600 mb-6 text-sm font-semibold">Your blueprint adjustments have been locked into the workshop build matrix queue.</p>
            <button onClick={() => setSubmitted(false)} class="bg-[#943A3A] text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wider">
              Create Another Configuration
            </button>
          </div>
        );
      }

      return (
        <div class="max-w-4xl mx-auto p-4 py-12">
          <h2 class="text-3xl font-black mb-8 uppercase text-center tracking-wide">Design Pad Studio</h2>
          <form onSubmit={handleSubmit} class="bg-white p-8 md:p-10 rounded-3xl border border-[#EAE3D2] shadow-sm space-y-6">
            
            <div>
              <label class="block font-bold text-xs uppercase mb-2 text-stone-700 tracking-wider">1. Describe your furniture concept</label>
              <textarea required class="w-full h-32 p-4 border border-[#EAE3D2] rounded-xl text-sm focus:outline-none focus:border-[#943A3A]" value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Type structural alterations, custom shapes, framing adjustments..." />
            </div>

            <div>
              <label class="block font-bold text-xs uppercase mb-2 text-stone-700 tracking-wider">2. Plan Geometry Dimensions</label>
              <input required class="w-full p-4 border border-[#EAE3D2] rounded-xl text-sm focus:outline-none focus:border-[#943A3A]" value={dimensions} onChange={(e) => setDimensions(e.target.value)} placeholder="E.g., Table: 150x80x75cm, Bench: 120x35x45cm" />
            </div>
            
            <div>
              <label class="block font-bold text-xs uppercase mb-2 text-stone-700 tracking-wider">3. Custom Add-ons & Integrated Hardware</label>
              <div class="flex gap-2 mb-3">
                <input class="flex-grow p-3 border border-[#EAE3D2] rounded-xl text-sm focus:outline-none focus:border-[#943A3A]" value={currentFeatureInput} onChange={(e) => setCurrentFeatureInput(e.target.value)} placeholder="Add specific additions (e.g., Heavy-duty pipe brackets, leveling feet)" onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); handleAddFeatureTag(); } }} />
                <button type="button" onClick={handleAddFeatureTag} class="bg-[#2D2A26] text-white px-4 rounded-xl flex items-center justify-center hover:bg-stone-800"><Icon name="plus-circle" size={18} /></button>
              </div>
              
              <div class="flex flex-wrap gap-2">
                {customFeatures.map(feat => (
                  <span key={feat} class="bg-[#F2ECE1] text-[#943A3A] font-bold px-3 py-1.5 rounded-lg text-xs flex items-center gap-2 border border-[#EAE3D2]">
                    {feat} <button type="button" onClick={() => setCustomFeatures(customFeatures.filter(f => f !== feat))} class="text-stone-400 hover:text-[#943A3A] font-bold">×</button>
                  </span>
                ))}
              </div>
            </div>

            <button type="submit" disabled={isSubmitting} class="w-full bg-[#943A3A] hover:bg-red-800 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-wider transition-colors shadow-sm">
              {isSubmitting ? 'Transmitting to Workshop...' : 'Submit to Fabrication Queue'}
            </button>
          </form>
        </div>
      );
    }

    // --- Inspiration Feed Block ---
    function ShowcaseView({ onLoadTemplate }) {
      return (
        <div class="max-w-6xl mx-auto p-4 py-12 animate-in fade-in duration-300">
          <h2 class="text-3xl font-black mb-2 uppercase text-center tracking-wide">Inspiration Feed</h2>
          <p class="text-center text-stone-500 font-semibold text-sm mb-10">Select a structural baseline to launch customize matrix presets</p>
          <div class="grid md:grid-cols-2 lg:grid-cols-2 gap-8">
            {PRESET_TEMPLATES.map(post => (
              <div key={post.id} class="bg-white rounded-3xl overflow-hidden border border-[#EAE3D2] shadow-sm flex flex-col justify-between">
                <div>
                  <img src={post.imgUrl} alt={post.title} class="w-full h-64 object-cover" />
                  <div class="p-6 space-y-3">
                    <h3 class="font-extrabold text-lg text-stone-900">{post.title}</h3>
                    <p class="text-xs text-stone-600 leading-relaxed font-medium">{post.desc}</p>
                    <div class="flex flex-wrap gap-1 pt-2">
                      {post.features.map(f => (
                        <span key={f} class="bg-[#FAF7F2] border border-[#EAE3D2] text-[10px] font-bold text-stone-600 px-2.5 py-1 rounded-md uppercase tracking-wide">{f}</span>
                      ))}
                    </div>
                  </div>
                </div>
                <div class="p-6 pt-0">
                  <button onClick={() => onLoadTemplate(post)} class="w-full bg-[#F2ECE1] border border-[#EAE3D2] py-3 rounded-xl font-bold text-xs uppercase tracking-wider hover:bg-[#EAE3D2] text-stone-800 transition-colors">
                    Configure This Layout
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ProfileView() {
      return (
        <div class="max-w-2xl mx-auto p-12 text-center my-12 border border-dashed border-[#EAE3D2] bg-white rounded-3xl shadow-sm">
          <Icon name="clock" size={32} className="mx-auto text-[#943A3A] mb-3" />
          <p class="text-stone-600 text-sm font-semibold">No active build projects. Use the Design Pad to compile specifications.</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
